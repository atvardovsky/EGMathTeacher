# Example Nginx site for https://atvardovsky.dev.
# Replace /var/www/egmathteacher/apps/web/dist with your deployed build path.

server {
  listen 80;
  listen [::]:80;
  server_name atvardovsky.dev www.atvardovsky.dev;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name atvardovsky.dev www.atvardovsky.dev;

  ssl_certificate /etc/letsencrypt/live/atvardovsky.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/atvardovsky.dev/privkey.pem;

  root /var/www/egmathteacher/apps/web/dist;
  index index.html;

  client_max_body_size 30m;

  location ~ ^/(auth|student-profile|tutor|admin|webrtc|health)(/|$) {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
