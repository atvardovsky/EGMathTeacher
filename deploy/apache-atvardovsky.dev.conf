# Apache vhost for EGMathTeacher on https://atvardovsky.dev.
#
# This file is named to be installed as:
#   /etc/apache2/sites-available/000-atvardovsky-egmathteacher.conf
# so it loads before the existing 000-default.conf vhost that currently serves
# /var/www/html for atvardovsky.dev.

<VirtualHost *:80>
    ServerName atvardovsky.dev
    ServerAlias www.atvardovsky.dev

    RewriteEngine On
    RewriteRule ^ https://atvardovsky.dev%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName atvardovsky.dev
    ServerAlias www.atvardovsky.dev

    DocumentRoot <TARGET_REPOSITORY_ROOT>/apps/web/dist
    DirectoryIndex index.html

    SSLEngine on
    SSLCertificateFile <CERT_DIR>/fullchain.pem
    SSLCertificateKeyFile <CERT_DIR>/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/egmathteacher.error.log
    CustomLog ${APACHE_LOG_DIR}/egmathteacher.access.log combined

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPreserveHost On
    ProxyRequests Off

    # Canonical host.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.atvardovsky\.dev$ [NC]
    RewriteRule ^ https://atvardovsky.dev%{REQUEST_URI} [R=301,L]

    # Nest API routes.
    ProxyPass /auth http://127.0.0.1:3000/auth retry=0
    ProxyPassReverse /auth http://127.0.0.1:3000/auth
    ProxyPass /student-profile http://127.0.0.1:3000/student-profile retry=0
    ProxyPassReverse /student-profile http://127.0.0.1:3000/student-profile
    ProxyPass /tutor http://127.0.0.1:3000/tutor retry=0
    ProxyPassReverse /tutor http://127.0.0.1:3000/tutor
    ProxyPass /admin http://127.0.0.1:3000/admin retry=0
    ProxyPassReverse /admin http://127.0.0.1:3000/admin
    ProxyPass /webrtc http://127.0.0.1:3000/webrtc retry=0
    ProxyPassReverse /webrtc http://127.0.0.1:3000/webrtc
    ProxyPass /health http://127.0.0.1:3000/health retry=0
    ProxyPassReverse /health http://127.0.0.1:3000/health

    <Directory <TARGET_REPOSITORY_ROOT>/apps/web/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
</VirtualHost>
</IfModule>
