# Apache vhost for EGMathTeacher on https://atvardovsky.dev.
#
# The install script renders @@PROJECT_DIR@@, @@SERVER_NAME@@,
# @@SERVER_NAME_REGEX@@, @@API_UPSTREAM@@, @@CERT_FULLCHAIN@@, and
# @@CERT_PRIVATE_KEY@@ before copying this template into Apache's
# sites-available directory.

<VirtualHost *:80>
    ServerName @@SERVER_NAME@@
    ServerAlias www.@@SERVER_NAME@@

    RewriteEngine On
    RewriteRule ^ https://@@SERVER_NAME@@%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName @@SERVER_NAME@@
    ServerAlias www.@@SERVER_NAME@@

    DocumentRoot @@PROJECT_DIR@@/apps/web/dist
    DirectoryIndex index.html

    SSLEngine on
    SSLCertificateFile @@CERT_FULLCHAIN@@
    SSLCertificateKeyFile @@CERT_PRIVATE_KEY@@
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/egmathteacher.error.log
    CustomLog ${APACHE_LOG_DIR}/egmathteacher.access.log combined

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPreserveHost On
    ProxyRequests Off

    # Canonical host.
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.@@SERVER_NAME_REGEX@@$ [NC]
    RewriteRule ^ https://@@SERVER_NAME@@%{REQUEST_URI} [R=301,L]

    # Nest API routes.
    ProxyPass /auth @@API_UPSTREAM@@/auth retry=0
    ProxyPassReverse /auth @@API_UPSTREAM@@/auth
    ProxyPass /student-profile @@API_UPSTREAM@@/student-profile retry=0
    ProxyPassReverse /student-profile @@API_UPSTREAM@@/student-profile
    ProxyPass /tutor @@API_UPSTREAM@@/tutor retry=0
    ProxyPassReverse /tutor @@API_UPSTREAM@@/tutor
    ProxyPass /admin @@API_UPSTREAM@@/admin retry=0
    ProxyPassReverse /admin @@API_UPSTREAM@@/admin
    ProxyPass /webrtc @@API_UPSTREAM@@/webrtc retry=0
    ProxyPassReverse /webrtc @@API_UPSTREAM@@/webrtc
    ProxyPass /health @@API_UPSTREAM@@/health retry=0
    ProxyPassReverse /health @@API_UPSTREAM@@/health

    <Directory @@PROJECT_DIR@@/apps/web/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
</VirtualHost>
</IfModule>
