name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser E2E
        run: npm run e2e

      - name: Check diagrams
        run: npm run diagrams:check

      - name: Check Alatyr adapter
        run: npm run alatyr:check
