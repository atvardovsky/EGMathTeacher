schema_version: 1
framework:
  name: "Alatyr Core"
  version: "0.1.0-alpha.0"
  source: "https://github.com/atvardovsky/AlatyrCore at 6a6bef16d6966264b0686534c813cdbda210194a"
  template_version: 1
  rule_registry: ".ai/framework/rule-registry.json"
installation:
  id: "ALATYR-20260709-egmathteacher"
  date: "2026-07-09"
  mode: "upgrade-applied-2026-07-12"
owner:
  responsible_team: "project maintainer"
  technical_owner: "atvardovsky"
  backup_owner: "unassigned - known gap"
  last_review_date: "2026-07-12"
  review_cadence: "after framework updates or broad assistant-governance changes"
  codeowners: ".github/CODEOWNERS"
  review_triggers:
    - "Alatyr framework update"
    - "new assistant bridge surface"
    - "approval, validation, source-access, or prompt-injection policy change"
    - "new AI infrastructure import or integration"
supported_assistants:
  - "Codex through AGENTS.md"
  - "AGENTS-aware assistants through AGENTS.md"
  - "generic assistants through AI_ASSISTANTS.md"
contours:
  framework: ".ai/framework"
  project: ".ai/project"
  assistant: ".ai/assistant"
source_of_truth:
  project_contour: ".ai/project/contour.md"
  registry: ".ai/project/source-of-truth-registry.md"
  assistant_contour: ".ai/assistant/contour.md"
  context_router: ".ai/assistant/context-router.json"
  context_profiles: ".ai/assistant/context-profiles.md"
  module_profile: ".ai/assistant/module-profile.md"
  project_sources:
    - "README.md"
    - ".ai/project/README.md"
    - ".ai/project/blueprint.md"
    - ".ai/project/contour.md"
    - ".ai/project/context-map.md"
    - ".ai/project/use-cases.md"
    - ".ai/project/architecture.md"
    - ".ai/project/runtime-flows.md"
    - ".ai/project/data-model.md"
    - ".ai/project/lesson-agent-tools.md"
    - ".ai/project/validation.md"
    - ".ai/project/gaps.md"
    - ".ai/project/security-safety.md"
    - ".ai/project/guards.md"
    - ".ai/project/diagrams.md"
    - ".ai/project/ui-guidelines.md"
    - ".ai/project/ui-tree.md"
    - "apps/api/README.md"
    - "apps/api/docs/webrtc-module.md"
    - "apps/api/Agent.md"
modules:
  core_profile: "complete with documented gaps"
  enabled:
    - "context-profiles"
    - "context-router"
    - "source-of-truth-registry"
    - "risk-approval-integrity"
    - "validation-and-final-evidence"
    - "blueprint-change"
    - "diagrams"
    - "ai-infrastructure"
    - "installed-operations"
    - "durable-approvals"
    - "migration-diff"
    - "local-alatyr-consistency-checker"
  deferred:
    - "multi-assistant-bridges: only AGENTS.md and AI_ASSISTANTS.md are currently supported"
    - "effectiveness-metrics: template installed, no comparative baseline yet"
    - "scaffolding: source dry-run tooling used for review only, not installed as target mechanism"
validation:
  commands:
    - name: "build"
      command: "npm run build"
      required_for:
        - "code-local"
        - "business-change"
        - "architecture-change"
    - name: "api-tests"
      command: "npm test"
      required_for:
        - "code-local"
        - "business-change"
        - "data-change"
    - name: "api-lint"
      command: "npm run lint"
      required_for:
        - "code-local"
        - "business-change"
    - name: "browser-e2e"
      command: "npm run e2e"
      required_for:
        - "web-ui workflow validation"
        - "first-login/tutor browser flow changes"
    - name: "diagram-render"
      command: "npm run diagrams:render"
      required_for:
        - "diagram source changes"
    - name: "diagram-drift-check"
      command: "npm run diagrams:check"
      required_for:
        - "diagram generated-artifact checks"
    - name: "dev-smoke"
      command: "npm run smoke:dev"
      required_for:
        - "running dev stack route checks"
    - name: "alatyr-consistency"
      command: "npm run alatyr:check"
      required_for:
        - "adapter consistency checks"
    - name: "manual adapter source review"
      command: "manual review of .ai, bridge files, and source references"
      required_for:
        - "framework-upgrade"
        - "ai-infrastructure"
operations:
  help: ".ai/assistant/help.md"
  help_reference: ".ai/assistant/help-reference.md"
  operation_request: ".ai/assistant/templates/operation-request.md"
  installation_note: ".ai/assistant/templates/installation-note.md"
  output_contracts: ".ai/assistant/templates/adapter-output-contracts.md"
  ai_infrastructure_inventory: ".ai/assistant/templates/ai-infrastructure-inventory.md"
  migration_note: ".ai/assistant/templates/migration-note.md"
  effectiveness_report: ".ai/assistant/templates/effectiveness-report.md"
maturity:
  profile: ".ai/assistant/maturity-profile.md"
bridges:
  capability_matrix: ".ai/assistant/bridge-capability-matrix.md"
approvals:
  directory: ".ai/assistant/approvals"
  template: ".ai/assistant/approvals/approval-template.md"
policies:
  source_access: ".ai/assistant/policies/ai-infrastructure-source-access.md"
  prompt_injection: ".ai/assistant/policies/prompt-injection.md"
known_gaps:
  - "Backup owner remains unassigned for adapter governance"
  - "No formal production privacy policy or incident procedure"
  - "No frontend component, accessibility, or visual regression test command"
  - "Production auth hardening remains POC-only"
  - "Production backup, restore, rollback, and incident runbooks remain undefined"
local_deviations:
  - "Only AGENTS.md and AI_ASSISTANTS.md bridge files are installed"
  - "Optional Claude, Gemini, Cursor, GitHub Copilot, Devin/Cascade, and Windsurf bridge files are intentionally not installed"
  - "Existing focused gate files under .ai/assistant/gates are retained in addition to the compact source checklist"
  - "Existing ai-infrastructure-adaptation.flow.md is retained as a compatibility alias for skill-adaptation.flow.md"
